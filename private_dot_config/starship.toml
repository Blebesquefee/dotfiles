format = "$all"
right_format = "$battery"

[username]
style_user = "blue bold"
style_root = "red bold"
format = " [$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = '\[[$hostname](purple bold)\] '
trim_at = "."
disabled = false

[character]
success_symbol = "[έηε](bold green)"
error_symbol = "[έεΩ](bold red)"

# configure directory
[directory]
read_only = " Ύι╜"
truncation_length = 10
# truncates directory to root folder if in github repo
truncate_to_repo = true
style = "bold italic green"

[battery]
full_symbol = " ΎΧ╕"
charging_symbol = " ΎΨΔ"
discharging_symbol = " ΎΧ╝"
empty_symbol = " ΎΨΞ"

[[battery.display]]
threshold = 25
style = "red bold"

[[battery.display]]
threshold = 50
style = "yellow bold"

[[battery.display]]
threshold = 100
style = "green bold"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "ΌΝ╜  "

[conda]
symbol = "ΎΕΝ "

[dart]
symbol = "Όηα "

[docker_context]
symbol = "ΎΝΙ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "ΌΚ╡ "

[elm]
symbol = "Όαυ "

[git_branch]
symbol = "ΎΡα "

[golang]
symbol = "Όαπ "

[hg_branch]
symbol = "ΎΡα "

[java]
symbol = "ΌΚΨ "

[julia]
symbol = "Όαν "

[memory_usage]
symbol = "Ύκγ "

[nim]
symbol = "Ύγν "

[nix_shell]
symbol = "ΎΜε "

[package]
symbol = "ΎμΨ "

[perl]
symbol = "Όζσ "

[php]
symbol = "ΌαΙ "

[python]
symbol = "ΌαΗ "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "ΌΙ╛ "

[rust]
symbol = "Όηρ "

[scala]
symbol = "Όε╖ "

[shlvl]
